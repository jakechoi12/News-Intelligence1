name: Daily News Collection

# 하루 1회: 매일 오전 9시(KST) 수집 → 커밋/푸시 → Teams 알림 → GitHub Pages 배포
on:
  schedule:
    # 매일 1번만 실행. UTC 00:00 = KST 09:00, 평일(월~금)
    - cron: '0 0 * * 1-5'
  workflow_dispatch:
    # 수동 실행 (Actions 탭에서 Run workflow)

jobs:
  collect:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run news collection
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          PYTHONIOENCODING: utf-8
        run: python backend/run_collection.py
      
      - name: Commit and push data files
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          
          # 데이터 파일 추가
          git add frontend/data/
          
          # 변경사항이 있을 때만 커밋
          if ! git diff --staged --quiet; then
            git commit -m "📊 Daily news update $(date +%Y-%m-%d)"
            
            # 푸시 시도
            if ! git push origin main; then
              echo "⚠️ Push failed, fetching and resetting..."
              
              # 원격 변경사항 가져오기
              git fetch origin main
              
              # 현재 커밋 저장
              CURRENT_COMMIT=$(git rev-parse HEAD)
              
              # 원격 브랜치로 리셋 후 데이터 파일만 다시 복사
              git reset --hard origin/main
              
              # 방금 생성한 데이터 파일을 다시 체크아웃
              git checkout $CURRENT_COMMIT -- frontend/data/
              
              # 다시 커밋 및 푸시
              git add frontend/data/
              git commit -m "📊 Daily news update $(date +%Y-%m-%d)"
              git push origin main || echo "⚠️ Final push failed, but continuing..."
            fi
          else
            echo "No changes to commit"
          fi
      
      - name: Send Teams notification
        if: success()
        continue-on-error: true  # Teams 알림 실패해도 워크플로는 성공 처리
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [ -n "$TEAMS_WEBHOOK_URL" ]; then
            python backend/notify_teams.py || echo "⚠️ Teams notification failed, but continuing..."
          else
            echo "⚠️ TEAMS_WEBHOOK_URL not set, skipping notification"
          fi

  # Deploy to GitHub Pages
  deploy:
    needs: collect
    runs-on: ubuntu-latest
    
    permissions:
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main  # 최신 커밋 가져오기
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'frontend'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

